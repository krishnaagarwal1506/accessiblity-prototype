<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: sans-serif;
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    code {
      background-color: #eee;
      padding: 2px 4px;
      border-radius: 3px;
    }

    button {
      margin-top: 15px;
      margin-right: 10px;
      padding: 8px 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    #loadingIndicator {
      display: none;
      color: #666;
      font-style: italic;
      margin-top: 10px;
    }

    .button-group {
      margin: 15px 0;
    }
  </style>
</head>

<body>
  <h1>Click Accessibility Issues</h1>
  <p>The following elements have click handlers but may not be accessible via keyboard.</p>

  <div class="button-group">
    <button id="refreshBtn">Refresh Check</button>
    <button id="exportBtn">Export as CSV</button>
    <span id="loadingIndicator">Checking...</span>
  </div>

  <hr>
  <table id="issuesTable">
    <thead>
      <tr>
        <th>Element</th>
        <th>HTML Snippet</th>
        <th>Reason for Failure</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>
  <script src="panel.js"></script>
</body>

</html>
